<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Waypoints</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <button id="locate-btn" class="floating-btn" type="button" title="Locate me" aria-label="Locate me">
    ◎
  </button>

  <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>

  <section id="editor-sheet" class="sheet hidden" aria-hidden="true">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <h2 id="sheet-title">Add waypoint</h2>
      <button id="close-sheet-btn" class="icon-btn" type="button" aria-label="Close">✕</button>
    </div>

    <form id="waypoint-form">
      <input id="waypoint-id" type="hidden" />

      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Place name" required />
      </div>

      <div class="field">
        <label for="address">Address</label>
        <input id="address" type="text" placeholder="Address or area" />
      </div>

      <div class="field">
        <label for="category">Category</label>
        <select id="category" required>
          <option value="">Choose one</option>
          <option value="grocery">Grocery</option>
          <option value="restaurant">Restaurant</option>
          <option value="park">Park</option>
          <option value="cafe">Cafe</option>
          <option value="facility">Facility</option>
          <option value="store">Store</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" rows="4" placeholder="Why this place matters"></textarea>
      </div>

      <div class="coords-box">
        <div><strong>Lat:</strong> <span id="lat-display">—</span></div>
        <div><strong>Lng:</strong> <span id="lng-display">—</span></div>
      </div>

      <div class="action-row">
        <button id="save-btn" type="submit" class="primary-btn">Save</button>
        <button id="delete-btn" type="button" class="danger-btn hidden">Delete</button>
      </div>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
